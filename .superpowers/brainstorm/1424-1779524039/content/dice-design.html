<h2>骰子面板设计 — 从书页右侧弹出</h2>
<p class="subtitle">骰子视觉 + 判定值对比 + 成功绿/失败红</p>

<div class="section">
  <h3>成功状态（d100 = 42，技能 65%）</h3>
</div>

<div class="mockup" style="background: #1a1410; padding: 32px; border-radius: 8px;">
  <div class="mockup-header" style="color: #c4a855;">骰子从书脊右侧滑出，悬浮于书页之上</div>
  <div class="mockup-body">

    <div style="display: flex; justify-content: center; position: relative;">

      <!-- Storybook (static background) -->
      <div style="display: flex; background: linear-gradient(to right, #3d2b13 0%, #2a1f14 50%, #3d2b13 100%); border-radius: 6px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); opacity: 0.4;">
        <div style="width: 340px; height: 460px; background: linear-gradient(135deg, #f4e4c1 0%, #e8d5a3 50%, #d4c4a0 100%); border-radius: 3px 1px 1px 3px;"></div>
        <div style="width: 340px; height: 460px; background: linear-gradient(135deg, #e8d5a3 0%, #f4e4c1 50%, #d4c4a0 100%); border-radius: 1px 3px 3px 1px;"></div>
      </div>

      <!-- DICE PANEL: popping from right side of book -->
      <div style="position: absolute; right: -120px; top: 60px; background: #1a1410; border: 1px solid #3d2b13; border-left: 3px solid #3a6b5a; border-radius: 6px; padding: 24px 20px; box-shadow: -12px 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(58,107,90,0.1); width: 220px;">

        <!-- Connection line to book spine -->
        <div style="position: absolute; left: -32px; top: 50%; width: 32px; height: 2px; background: linear-gradient(to right, transparent, #3d2b13);"></div>

        <!-- Dice visual -->
        <div style="text-align: center; margin-bottom: 16px;">
          <div style="display: inline-block; width: 72px; height: 72px; background: linear-gradient(145deg, #2a1f14 0%, #1a1410 100%); border: 2px solid #c4a855; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(196,168,85,0.1); position: relative;">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: #c4a855; border-radius: 50%; box-shadow: 0 0 8px rgba(196,168,85,0.5);"></div>
            <!-- d100 marks -->
            <div style="position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #8b7858; border-radius: 50%;"></div>
            <div style="position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #8b7858; border-radius: 50%;"></div>
            <div style="position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 4px; height: 4px; background: #8b7858; border-radius: 50%;"></div>
            <div style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 4px; height: 4px; background: #8b7858; border-radius: 50%;"></div>
          </div>
        </div>

        <!-- Skill name -->
        <div style="text-align: center; color: #8b7858; font-size: 10px; letter-spacing: 3px; margin-bottom: 4px;">侦查检定</div>

        <!-- Result row: roll vs target -->
        <div style="display: flex; justify-content: center; align-items: baseline; gap: 12px; margin-bottom: 8px;">
          <div style="text-align: center;">
            <div style="color: #8b7858; font-size: 8px;">掷出</div>
            <div style="color: #f4e4c1; font-size: 36px; font-weight: bold; font-family: monospace;">42</div>
          </div>
          <div style="color: #8b7858; font-size: 16px;">/</div>
          <div style="text-align: center;">
            <div style="color: #8b7858; font-size: 8px;">目标</div>
            <div style="color: #c4a855; font-size: 22px; font-weight: bold; font-family: monospace;">65</div>
          </div>
        </div>

        <!-- Success indicator -->
        <div style="text-align: center; padding: 8px 0; border-top: 1px solid #3d2b13;">
          <span style="background: rgba(58,107,90,0.2); color: #5aab7a; padding: 4px 16px; border-radius: 2px; font-size: 13px; letter-spacing: 2px; border: 1px solid #3a6b5a;">普通成功</span>
        </div>

        <!-- Action buttons -->
        <div style="display: flex; justify-content: center; gap: 6px; margin-top: 12px;">
          <span class="mock-button" style="background: transparent; border: 1px solid #3d2b13; color: #d4c4a0; padding: 4px 10px; border-radius: 2px; font-size: 10px;">继续</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 32px;">
  <h3>对比：成功 vs 失败</h3>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">

  <!-- SUCCESS -->
  <div class="mockup">
    <div class="mockup-header" style="color: #5aab7a;">普通成功 — 42/65</div>
    <div class="mockup-body" style="background: #1a1410; padding: 20px; border: 1px solid #3d2b13; border-left: 3px solid #3a6b5a; text-align: center;">
      <div style="display: inline-block; width: 56px; height: 56px; background: linear-gradient(145deg, #2a1f14, #1a1410); border: 2px solid #3a6b5a; border-radius: 8px; margin-bottom: 12px; box-shadow: 0 0 16px rgba(58,107,90,0.2);">
        <div style="line-height: 56px; font-size: 20px; color: #f4e4c1; font-family: monospace;">42</div>
      </div>
      <div style="display: flex; justify-content: center; align-items: baseline; gap: 12px; margin-bottom: 6px;">
        <span style="color: #f4e4c1; font-size: 32px; font-family: monospace;">42</span>
        <span style="color: #8b7858; font-size: 14px;">/</span>
        <span style="color: #c4a855; font-size: 20px; font-family: monospace;">65</span>
      </div>
      <div style="color: #5aab7a; font-size: 13px; letter-spacing: 2px; padding: 4px 12px; border: 1px solid #3a6b5a; border-radius: 2px; display: inline-block; background: rgba(58,107,90,0.1);">普通成功</div>
    </div>
  </div>

  <!-- FAILURE -->
  <div class="mockup">
    <div class="mockup-header" style="color: #c44a4a;">失败 — 78/65</div>
    <div class="mockup-body" style="background: #1a1410; padding: 20px; border: 1px solid #3d2b13; border-left: 3px solid #8b3a3a; text-align: center;">
      <div style="display: inline-block; width: 56px; height: 56px; background: linear-gradient(145deg, #2a1f14, #1a1410); border: 2px solid #8b3a3a; border-radius: 8px; margin-bottom: 12px; box-shadow: 0 0 16px rgba(139,58,58,0.2);">
        <div style="line-height: 56px; font-size: 20px; color: #f4e4c1; font-family: monospace;">78</div>
      </div>
      <div style="display: flex; justify-content: center; align-items: baseline; gap: 12px; margin-bottom: 6px;">
        <span style="color: #c44a4a; font-size: 32px; font-family: monospace;">78</span>
        <span style="color: #8b7858; font-size: 14px;">/</span>
        <span style="color: #c4a855; font-size: 20px; font-family: monospace;">65</span>
      </div>
      <div style="color: #c44a4a; font-size: 13px; letter-spacing: 2px; padding: 4px 12px; border: 1px solid #8b3a3a; border-radius: 2px; display: inline-block; background: rgba(139,58,58,0.1);">失败</div>
    </div>
  </div>

</div>

<div style="margin-top: 24px;">
  <p class="subtitle">骰子面板从书脊右侧以 spring 动画滑出，成功时绿色边框+辉光，失败时红色。d100 骰子带点数和表圈装饰。</p>
</div>
